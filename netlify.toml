[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/webhook"
  to = "/.netlify/functions/webhook"
  status = 200

[[redirects]]
  from = "/api/calls"
  to = "/.netlify/functions/calls"
  status = 200

[dev]
  port = 8888
  autoLaunch = false
